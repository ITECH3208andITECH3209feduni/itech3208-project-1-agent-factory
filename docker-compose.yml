services:
  nanoclaw:
    build: .
    container_name: nanoclaw
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "npm install && npm run build && npm start"
    environment:
      - HOST_PROJECT_PATH=${PWD}
    env_file:
      - .env
